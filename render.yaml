services:
  - type: keyvalue
    name: crde-redis
    plan: free
    ipAllowList: []

  - type: web
    name: crde-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: crde-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://frontend-sable-kappa-64.vercel.app,http://localhost:5173,http://127.0.0.1:5173
